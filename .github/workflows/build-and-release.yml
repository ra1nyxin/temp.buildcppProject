name: OS-ImGui Regex Surgery Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_dll:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup MSVC Toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Regex-Based Code Surgery
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "imgui", "Minhook" -Force
          git clone --depth 1 --branch v1.89.9 https://github.com/ocornut/imgui.git imgui_repo
          Copy-Item "imgui_repo\*.h", "imgui_repo\*.cpp", "imgui_repo\backends\*" -Destination "imgui\" -Force
          
          git clone --depth 1 https://github.com/TsudaKageyu/minhook.git minhook_repo
          Copy-Item "minhook_repo\include\*" "Minhook\" -Force
          Copy-Item "minhook_repo\src\*.c", "minhook_repo\src\*.h", "minhook_repo\src\hde\*" -Destination "." -Force

          git clone --depth 1 https://github.com/TKazer/OS-ImGui.git osimgui_repo
          Get-ChildItem -Path "osimgui_repo\OS-ImGui" -File -Recurse | Copy-Item -Destination "." -Force

          $osImGuiCpp = Get-Content "OS-ImGui.cpp" -Raw
          $osImGuiCpp = $osImGuiCpp -replace '(?m)^\s*Window->DrawList->AddShadowRect\(.*?\);', '// AddShadowRect Removed'
          $osImGuiCpp = $osImGuiCpp -replace '(?m)^\s*Window->DrawList->AddShadowCircle\(.*?\);', '// AddShadowCircle Removed'
          $osImGuiCpp = $osImGuiCpp -replace 'ImGui::ItemHoverable\s*\(\s*(.*?)\s*,\s*(.*?)\s*,\s*.*?\s*\)', 'ImGui::ItemHoverable($1, $2)'
          $osImGuiCpp = $osImGuiCpp -replace 'ImDrawCornerFlags\s+rounding_corners', 'ImDrawFlags rounding_corners'
          Set-Content -Path "OS-ImGui.cpp" -Value $osImGuiCpp

          $compatMacros = @"
          #ifndef IMDRAWFLAGS_DEFINED
          #define IMDRAWFLAGS_DEFINED
          #define ImDrawCornerFlags ImDrawFlags
          #define ImDrawCornerFlags_All ImDrawFlags_RoundCornersAll
          #define ImDrawCornerFlags_Top ImDrawFlags_RoundCornersTop
          #define ImDrawCornerFlags_Bot ImDrawFlags_RoundCornersBottom
          #define ImDrawCornerFlags_Left ImDrawFlags_RoundCornersLeft
          #define ImDrawCornerFlags_Right ImDrawFlags_RoundCornersRight
          #define ImDrawCornerFlags_None ImDrawFlags_RoundCornersNone
          #endif
          "@
          $imguiHeader = Get-Content "imgui\imgui.h" -Raw
          Set-Content -Path "imgui\imgui.h" -Value ($compatMacros + "`n" + $imguiHeader)

          Write-Host "[SUCCESS] Regex surgery applied to OS-ImGui.cpp"

      - name: Technical Synthesis (CL Compilation)
        shell: cmd
        run: |
          cl.exe /nologo /O2 /MT /W3 /std:c++17 /I. /Iimgui /IMinhook ^
          /DUNICODE /D_UNICODE /DOSIMGUI_INTERNAL /DIMGUI_DISABLE_OBSOLETE_FUNCTIONS=0 ^
          main.cpp ^
          imgui/imgui.cpp imgui/imgui_draw.cpp imgui/imgui_tables.cpp imgui/imgui_widgets.cpp ^
          imgui/imgui_impl_win32.cpp imgui/imgui_impl_dx11.cpp ^
          OS-ImGui.cpp OS-ImGui_External.cpp ^
          buffer.c hde64.c hook.c trampoline.c ^
          /link /DLL /OUT:Hex_Internal_Module.dll ^
          user32.lib gdi32.lib d3d11.lib d3dcompiler.lib dwmapi.lib

      - name: Archive Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hex_Internal_Module
          path: Hex_Internal_Module.dll
