name: OS-ImGui Expert Synthesis

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build_dll:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup MSVC Toolchain
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Dynamic Dependency Injection
        shell: powershell
        run: |
          # 1. 克隆 ImGui 核心
          git clone --depth 1 https://github.com/ocornut/imgui.git imgui_repo
          
          # 2. 克隆 OS-ImGui 框架
          git clone --depth 1 https://github.com/TKazer/OS-ImGui.git osimgui_repo
          
          # 3. 递归提取所有头文件和源文件到当前目录 (Flatten Structure)
          Get-ChildItem -Path "imgui_repo", "osimgui_repo" -Filter *.h -Recurse | Copy-Item -Destination "." -Force
          Get-ChildItem -Path "imgui_repo", "osimgui_repo" -Filter *.cpp -Recurse | Copy-Item -Destination "." -Force
          
          Write-Host "[INFO] Dependencies Flattened."

      - name: Technical Synthesis (CL Compilation)
        shell: cmd
        run: |
          :: 现在 cl.exe 已经位于 PATH 中，且 INCLUDE/LIB 已初始化
          cl.exe /nologo /O2 /MT /W3 /std:c++17 /I. /DUNICODE /D_UNICODE /DOSIMGUI_INTERNAL ^
          main.cpp ^
          imgui.cpp imgui_draw.cpp imgui_tables.cpp imgui_widgets.cpp imgui_demo.cpp ^
          OS-ImGui.cpp OS-ImGui_External.cpp ^
          /link /DLL /OUT:Hex_Internal_Module.dll ^
          user32.lib gdi32.lib d3d11.lib d3dcompiler.lib dwmapi.lib

      - name: Binary Integrity Verification
        shell: powershell
        run: |
          if (Test-Path "Hex_Internal_Module.dll") {
              $hash = Get-FileHash "Hex_Internal_Module.dll" -Algorithm SHA256
              Write-Host "[SUCCESS] SHA256: $($hash.Hash)"
          } else {
              Write-Error "DLL Synthesis Failed."
              exit 1
          }

      - name: Archive Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hex_Internal_Module
          path: Hex_Internal_Module.dll
