name: OS-ImGui Automation Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build_dll:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Inject Expert Dependencies
        shell: powershell
        run: |
          # 1. 克隆 ImGui 核心 (Docking分支通常兼容性更好)
          git clone --depth 1 https://github.com/ocornut/imgui.git imgui_repo
          
          # 2. 克隆 OS-ImGui 框架
          git clone --depth 1 https://github.com/TKazer/OS-ImGui.git osimgui_repo
          
          # 3. 物理拓扑重构：将所有必要的源码移动到根目录，方便 cl.exe 包含
          # 提取 ImGui 核心文件
          Copy-Item "imgui_repo/*.h" "."
          Copy-Item "imgui_repo/*.cpp" "."
          
          # 提取 OS-ImGui 核心文件 (注意其仓库层级在 OS-ImGui/OS-ImGui/)
          Copy-Item "osimgui_repo/OS-ImGui/OS-ImGui.h" "."
          Copy-Item "osimgui_repo/OS-ImGui/OS-ImGui.cpp" "."
          Copy-Item "osimgui_repo/OS-ImGui/OS-ImGui_Struct.h" "."
          Copy-Item "osimgui_repo/OS-ImGui/OS-ImGui_External.h" "."
          Copy-Item "osimgui_repo/OS-ImGui/OS-ImGui_External.cpp" "."

      - name: Setup MSVC Toolchain
        uses: microsoft/setup-msbuild@v2

      - name: Technical Synthesis (CL Compilation)
        shell: cmd
        run: |
          :: 直接调用编译器进行全量编译
          :: /O2: 速度优化 /MT: 静态链接 /std:c++17: 现代标准
          :: 包含 main.cpp, imgui*.cpp, OS-ImGui*.cpp
          cl.exe /nologo /O2 /MT /W3 /std:c++17 /I. /DUNICODE /D_UNICODE /DOSIMGUI_INTERNAL ^
          main.cpp imgui.cpp imgui_draw.cpp imgui_tables.cpp imgui_widgets.cpp ^
          OS-ImGui.cpp OS-ImGui_External.cpp ^
          /link /DLL /OUT:Hex_Internal_Module.dll ^
          user32.lib gdi32.lib d3d11.lib d3dcompiler.lib dwmapi.lib

      - name: Archive Production Build
        uses: actions/upload-artifact@v4
        with:
          name: Synthesized-DLL
          path: Hex_Internal_Module.dll

      - name: Auto-Release (on tag or manual)
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        with:
          files: Hex_Internal_Module.dll
          tag_name: build-${{ github.run_number }}
          body: "Automated technical synthesis of Hex* module."
